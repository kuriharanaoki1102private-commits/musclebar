<!DOCTYPE html>
<html lang="ja">
<head>

<title>X自動投稿システム</title>
<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,'Hiragino Sans',sans-serif;overflow-x:hidden}
button,input,textarea,select{font-family:inherit;outline:none;border:none}
button{cursor:pointer;background:none;color:inherit}
.hdr{height:58px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:10px;position:sticky;top:0;z-index:100}
.hdr-title{font-size:16px;font-weight:700;flex:1}
.hdr-sub{font-size:11px;color:var(--tx2);margin-top:1px}
.btn-back{width:36px;height:36px;border:1px solid var(--bd);border-radius:9px;background:var(--bg3);color:var(--tx2);font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-logout{border:1px solid var(--bd);color:var(--tx2);padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600}
.ntabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bd);overflow-x:auto;scrollbar-width:none}

.ntab{padding:12px 14px;font-size:13px;font-weight:600;color:var(--tx2);white-space:nowrap;border-bottom:2px solid transparent;display:flex;align-items:center;gap:6px;flex-shrink:0;cursor:pointer}
.ntab.on{color:var(--tx);border-bottom-color:var(--bl2)}
.pg{padding:14px;max-width:700px;margin:0 auto}
.hc{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:20px 18px;margin-bottom:12px;display:flex;align-items:flex-start;gap:16px;cursor:pointer}
.hc:active{background:var(--bg3)}
.hc-ico{width:48px;height:48px;border-radius:12px;background:#1e3a8a;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:rgba(255,255,255,.9)}

.hc-sub{font-size:13px;color:var(--bl3);margin-bottom:7px;font-weight:500}

.ct{font-size:14px;font-weight:700}

.eico{width:58px;height:58px;background:var(--bg3);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;border:1px solid var(--bd);opacity:.45}

.edesc{font-size:13px;color:var(--tx2);line-height:1.5}
.fl{margin-bottom:13px}
.fl label{font-size:13px;font-weight:600;margin-bottom:6px;display:block}

.usr-row{padding:13px 0;border-bottom:1px solid var(--bg4)}

.tw{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:min(340px,calc(100vw - 32px))}
.t{background:var(--bg3);border:1px solid var(--bd);border-radius:10px;padding:12px 16px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:9px;animation:tIn .22s ease;box-shadow:0 8px 30px #0009;border-left:3px solid var(--bl)}

.t.e{border-left-color:var(--rd);color:var(--rd)}
.t.i{border-left-color:var(--bl3);color:var(--bl3)}

@keyframes spin{to{transform:rotate(360deg)}}
code{background:var(--bg3);border:1px solid var(--bd);padding:2px 6px;border-radius:5px;font-size:11px;font-family:monospace}

var WD=['日','月','火','水','木','金','土'];
function fmtS(d){var a=d.split('-');return parseInt(a[1])+'/'+parseInt(a[2])+'('+WD[new Date(d).getDay()]+')'}
function fmtDT(iso){try{var d=new Date(iso);return d.getFullYear()+'/'+p2(d.getMonth()+1)+'/'+p2(d.getDate())+' '+p2(d.getHours())+':'+p2(d.getMinutes())}catch(e){return iso||''}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function nl(s){return esc(s).replace(/\n/g,'<br>')}
// 画像を圧縮してDataURL化（最大800px、JPEG 0.7）
function rf(f){
  return new Promise(function(res,rej){
    var reader=new FileReader();
    reader.onerror=rej;
    reader.onload=function(e){
      var img=new Image();
      img.onerror=rej;
      img.onload=function(){
        var MAX=800;
        var w=img.width,h=img.height;
        if(w>MAX||h>MAX){
          if(w>h){h=Math.round(h*MAX/w);w=MAX}
          else{w=Math.round(w*MAX/h);h=MAX}
        }
        var cv=document.createElement('canvas');
        cv.width=w;cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        res(cv.toDataURL('image/jpeg',0.7));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(f);
  });
}
function addLog(type,title,desc){if(!S.logs)S.logs=[];S.logs.unshift({id:uid(),type:type,title:title,desc:desc||'',time:new Date().toISOString()});if(S.logs.length>300)S.logs=S.logs.slice(0,300);sv()}
function toast(msg,type){
  type=type||'i';

  var el=document.createElement('div');
  el.className='t '+type;
  el.innerHTML='<span>'+(type==='s'?'✓':type==='e'?'✕':'ℹ')+'</span><span>'+esc(msg)+'</span>';
  w.appendChild(el);
  setTimeout(function(){el.style.opacity='0';el.style.transition='opacity .25s';setTimeout(function(){el.remove()},250)},3200);
}

// 定休日判定：必ずカレンダーデータから（曜日判定禁止）
function isClosed(d){var r=(S.calData||[]).find(function(x){return x.date===d});return r?!!r.isClosed:false}

function getEvent(d){var r=(S.calData||[]).find(function(x){return x.date===d});return r?r.eventName||null:null}

// 次の営業日を取得（カレンダーデータ最優先・連休対応）
function nextBiz(d){
  var dt=new Date(d+'T00:00:00'); // d=previewDate()
  for(var i=0;i<60;i++){
    dt.setDate(dt.getDate()+1);
    var s=dt.toISOString().split('T')[0];
    if(!isClosed(s))return s;
  }
  return d;
}

// 日数差
function ddiff(a,b){return Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000)}

// 「○日後のマッスル」ラベル
function futureLabel(n){
  if(n<=1)return'明日';
  if(n===2)return'明後日';
  return n+'日後';
}

// 「○日前」表現（12時投稿用）
function pastExpr(n){
  if(n<=1)return'昨日';
  if(n===2)return'一昨日';
  return n+'日前';
}

// 「○日後」表現（17時投稿用）
function futureExpr(n){
  if(n<=1)return'明日';
  if(n===2)return'明後日';
  return n+'日後';
}

function genText(date,slot){
  var closed=isClosed(date);
  if(!closed){
    var casts=getCasts(date),fb=false,fbDate=null;
    if(!casts.length){var past=(S.shiftData||[]).filter(function(r){return r.date<date&&r.casts.length}).sort(function(a,b){return b.date.localeCompare(a.date)});if(past.length){casts=past[0].casts;fb=true;fbDate=past[0].date}}
    var ev=getEvent(date);
    var castLine=casts.length?casts.join('、'):'（未登録）';
    var LF='\n';
    var text='';
    if(slot==='12:00'){
      text='こんにちまっする！'+LF+'昨日もたくさんのご来店'+LF+'ありがとうございマッスル！'+LF+'↓'+LF+'【本日のマッスル】'+LF+castLine;
    }else if(slot==='15:00'){
      if(ev){text='こんにちまっする！'+LF+'本日'+ev+'DAY！'+LF+'↓'+LF+'【本日のマッスル】'+LF+castLine;}
      else{text='こんにちまっする！'+LF+'本日も空きありマッスル！'+LF+'↓'+LF+'【本日のマッスル】'+LF+castLine;}
    }else{
      text='こんにちまっする！'+LF+'本日も空きありマッスル！'+LF+'↓'+LF+'【本日のマッスル】'+LF+castLine;
    }
    return{text:text,ht:HT,closed:false,fb:fb,fbDate:fbDate};
  }
  var nxt=nextBiz(date),diff=ddiff(date,nxt);
  var lbl=futureLabel(diff),past2=pastExpr(diff),fut=futureExpr(diff);
  var nc=getCasts(nxt);
  var castLine=nc.length?nc.join('、'):'（未登録）';
  var LF='\n';
  var text='';
  if(slot==='12:00'){
    text='こんにちまっする！'+LF+past2+'もたくさんのご来店'+LF+'ありがとうございマッスル！'+LF+'↓'+LF+'【'+lbl+'のマッスル】'+LF+castLine;
  }else if(slot==='15:00'){
    text='こんにちまっする！'+LF+'本日定休日！'+LF+'↓'+LF+'【'+lbl+'のマッスル】'+LF+castLine;
  }else{
    text='こんにちまっする！'+LF+fut+'も空きありマッスル！'+LF+'↓'+LF+'【'+lbl+'のマッスル】'+LF+castLine;
  }
  return{text:text,ht:HT,closed:true,nextDate:nxt,diff:diff};
}


// ── 共通：画像2枚をロード ──
function loadImages(du1, du2){
  return new Promise(function(res,rej){
    var ci=new Image(), qi=new Image(), n=0;
    function onl(){if(++n===2)res([ci,qi])}
    ci.onload=onl; qi.onload=onl; ci.onerror=rej; qi.onerror=rej;
    ci.src=du1; qi.src=du2;
  });
}

// プレビュー用：正方形1:1クロップ表示（キャスト左・QR右）
function composePreview(castDu, qrDu){
  return loadImages(castDu, qrDu).then(function(imgs){
    var ci=imgs[0], qi=imgs[1];
    var size=Math.min(ci.naturalWidth, ci.naturalHeight); // 正方形サイズ
    var cv=document.createElement('canvas');
    cv.width=size*2; cv.height=size;
    var ctx=cv.getContext('2d');
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,size*2,size);
    // キャスト：中央クロップ
    var sx=Math.round((ci.naturalWidth-size)/2);
    var sy=Math.round((ci.naturalHeight-size)/2);
    ctx.drawImage(ci, sx, sy, size, size, 0, 0, size, size);
    // QR：正方形エリアに収める（白背景・中央）
    var qScale=Math.min(size/qi.naturalWidth, size/qi.naturalHeight);
    var qW=Math.round(qi.naturalWidth*qScale);
    var qH=Math.round(qi.naturalHeight*qScale);
    ctx.fillStyle='#fff'; ctx.fillRect(size,0,size,size);
    ctx.drawImage(qi, size+Math.round((size-qW)/2), Math.round((size-qH)/2), qW, qH);
    return cv.toDataURL('image/jpeg', 0.85);
  });
}

// X投稿用：元比率のまま（キャスト左・QR右、高さ揃え）
function composeFull(castDu, qrDu){
  return loadImages(castDu, qrDu).then(function(imgs){
    var ci=imgs[0], qi=imgs[1];
    var ch=ci.naturalHeight, cw=ci.naturalWidth;
    var qSize=ch; // QRエリアはキャストと同じ高さの正方形
    var cv=document.createElement('canvas');
    cv.width=cw+qSize; cv.height=ch;
    var ctx=cv.getContext('2d');
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,cw+qSize,ch);
    ctx.drawImage(ci,0,0,cw,ch);
    var qScale=Math.min(qSize/qi.naturalWidth, qSize/qi.naturalHeight);
    var qW=Math.round(qi.naturalWidth*qScale);
    var qH=Math.round(qi.naturalHeight*qScale);
    ctx.drawImage(qi, cw+Math.round((qSize-qW)/2), Math.round((ch-qH)/2), qW, qH);
    return cv.toDataURL('image/jpeg', 0.92);
  });
}

// 後方互換（プレビュー用のデフォルト）
function compose(castDu, qrDu){ return composePreview(castDu, qrDu); }

// 17:00を過ぎたら翌日の日付を返す
function previewDate(){
  var now=new Date();
  var h=now.getHours(),m=now.getMinutes();
  // 17:00以降は翌日
  if(h>=17){
    var next=new Date(now);
    next.setDate(next.getDate()+1);
    return next.getFullYear()+'-'+p2(next.getMonth()+1)+'-'+p2(next.getDate());
  }
  return tod();
}

function doLogin(){
  var users=S.users||[];
  var sel=document.getElementById('ln-sel');
  var existing=null;
  if(sel&&sel.value&&sel.value!=='__new__'){
    // 既存ユーザー選択
    existing=users.find(function(u){return u.id===sel.value});
  } else {
    // 新規 or 初回
    var name=(document.getElementById('ln-name')||{}).value||'';
    var email=(document.getElementById('ln-email')||{}).value||'';
    name=name.trim();email=email.trim();
    if(!name||!email){toast('名前とメールを入力してください','e');return}
    existing=users.find(function(u){return u.email===email});
    if(!existing){
      if(!S.users)S.users=[];
      var nu={id:uid(),name:name,email:email,role:S.users.length===0?'admin':'user',status:'active',isOwner:S.users.length===0,isMe:true,createdAt:new Date().toISOString()};
      S.users.push(nu);existing=nu;
    }
  }
  if(!existing){toast('アカウントが見つかりません','e');return}
  if(existing.status==='blocked'){S.auth={loggedIn:true,name:existing.name,email:existing.email,role:existing.role,id:existing.id,status:'blocked'};sv();render();return}
  S.users.forEach(function(u){u.isMe=u.id===existing.id});
  S.auth={loggedIn:true,name:existing.name,email:existing.email,role:existing.role,id:existing.id,status:'active'};
  sv();toast('ようこそ、'+existing.name+'さん！','s');go('home');
}

function importClaudeJSON(type){
  var el=document.getElementById('claude-json-'+type);
  if(!el||!el.value.trim()){toast('JSONを貼り付けてください','e');return}
  var text=el.value.trim().replace(/```[\w]*\n?/g,'').replace(/```/g,'').trim();
  var m=text.match(/\{[\s\S]*\}/);
  if(!m){toast('有効なJSONが見つかりません','e');return}
  var parsed;
  try{parsed=JSON.parse(m[0])}catch(e){toast('JSONの形式が正しくありません: '+e.message,'e');return}
  if(!parsed.days||!parsed.days.length){toast('データが空です','e');return}
  if(type==='cal'){
    if(!S.calData)S.calData=[];
    var cnt=0;
    parsed.days.forEach(function(d){
      if(!d.date)return;
      var idx=S.calData.findIndex(function(r){return r.date===d.date});
      var row={date:d.date,isClosed:!!d.isClosed,eventName:d.eventName||null};
      if(idx>=0)S.calData[idx]=row;else S.calData.push(row);
      cnt++;
    });
    sv();toast('カレンダー '+cnt+'日分を取り込みました','s');addLog('success','Claude自動入力','カレンダー '+cnt+'日分');
    goSub('cal');
  } else {
    if(!S.shiftData)S.shiftData=[];
    var cnt2=0;
    parsed.days.forEach(function(d){
      if(!d.date||!Array.isArray(d.casts))return;
      var idx=S.shiftData.findIndex(function(r){return r.date===d.date});
      if(idx>=0)S.shiftData[idx]={date:d.date,casts:d.casts};else S.shiftData.push({date:d.date,casts:d.casts});
      cnt2++;
    });
    sv();toast('シフト '+cnt2+'日分を取り込みました','s');addLog('success','Claude自動入力','シフト '+cnt2+'日分');
    goSub('shift');
  }
}

    return'<div class="usr-row"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px"><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700;display:flex;align-items:center;gap:5px;flex-wrap:wrap">'+esc(u.name)+(isMe?'<span class="bdg dgr2" style="font-size:10px">あなた</span>':'')+(u.isOwner?'<span class="bdg dbl" style="font-size:10px">オーナー</span>':'')+'</div><div style="font-size:12px;color:var(--tx2);margin-top:3px">'+esc(u.email)+'</div></div><div style="display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap">'+(u.role==='admin'?'<span class="bdg dbl">管理者</span>':'<span class="bdg dgr2">一般</span>')+(u.status==='active'?'<span class="bdg dgr">有効</span>':'<span class="bdg drd">ブロック</span>')+'</div></div>'+btns+'</div>';
  }).join('');
  return'<div class="hdr"><button class="btn-back" onclick="go(\'home\')">‹</button>'+ibox('users',18,'#1e40af',10)+'<div style="flex:1"><div class="hdr-title">ユーザー管理</div><div class="hdr-sub">ログインユーザーの一覧・権限・アク...</div></div></div>'
  +'<div class="pg"><div class="stat3"><div class="stat-c"><div class="stat-n">'+users.length+'</div><div class="stat-l">総ユーザー</div></div><div class="stat-c"><div class="stat-n" style="color:var(--bl3)">'+admins+'</div><div class="stat-l">管理者</div></div><div class="stat-c"><div class="stat-n" style="color:'+(blocked?'var(--rd)':'var(--tx2)')+'">'+blocked+'</div><div class="stat-l">ブロック</div></div></div>'
  +card('ログインユーザー一覧','','<p style="font-size:13px;color:var(--tx2);margin-bottom:14px;line-height:1.55">無効化されたユーザーはログインできなくなります。オーナーとあなた自身は無効化・降格できません。</p>'+rows,btn('＋ 招待','bp bsm',"showInviteForm()"))
  +'<div id="invite-form" style="display:none">'+card('ユーザーを招待','','<div class="fl"><label>名前</label><input class="inp" id="inv-name" placeholder="例: はるき"></div><div class="fl"><label>メールアドレス</label><input class="inp" id="inv-email" placeholder="example@gmail.com" type="email"></div><div class="fl"><label>ロール</label><select class="inp" id="inv-role"><option value="user">一般ユーザー</option><option value="admin">管理者</option></select></div><div style="display:flex;gap:8px"><button class="btn bp" style="flex:1" onclick="inviteUser()">招待する</button><button class="btn bo" onclick="hideInviteForm()">キャンセル</button></div>','')+'</div></div>';
}

// HELPERS
function card(title,desc,body,headerRight){return'<div class="card"><div class="ch"><div style="flex:1;min-width:0"><div class="ct">'+title+'</div>'+(desc?'<div class="cd">'+desc+'</div>':'')+'</div>'+(headerRight?'<div style="flex-shrink:0">'+headerRight+'</div>':'')+'</div><div class="cb">'+body+'</div></div>'}
function btn(label,cls,onclick){return'<button class="btn '+cls+'" onclick="'+onclick+'">'+label+'</button>'}
function upbox(fileId,onchange,fnId,uploadOnclick,hint){return'<div class="upbox"><div class="uprow"><label class="btn-sel">ファイルを選択<input type="file" accept="image/*" multiple style="display:none" id="'+fileId+'" onchange="'+onchange+'"></label><span class="fn" id="'+fnId+'">ファイル未選択</span></div><button class="btn-up" id="'+fileId+'-btn" onclick="'+uploadOnclick+'">'+svgi(IP.up,13)+' アップロード</button><div class="uph">'+hint+'</div></div>'}

// FILE ACTIONS（キャスト・QRのみ）
var _pf={cast:[],qr:[]};
function _setFN(id,files){var el=document.getElementById(id);if(el)el.textContent=files.length>1?files.length+'ファイル選択':files[0].name}
function _setBtn(id){var el=document.getElementById(id+'-btn');if(el)el.classList.add('on')}
function onCastFile(inp){_pf.cast=Array.from(inp.files);_setFN('cast-fn',_pf.cast);_setBtn('cast-file')}
function onQRFile(inp){_pf.qr=Array.from(inp.files);_setFN('qr-fn',_pf.qr);_setBtn('qr-file')}

// 並列処理で高速アップロード（最大8枚同時）
async function uploadParallel(files, processor, chunkSize){
  chunkSize = chunkSize || 16;
  var results = [];
  for(var i=0; i<files.length; i+=chunkSize){
    var chunk = files.slice(i, Math.min(i+chunkSize, files.length));
    var chunkResults = await Promise.all(chunk.map(processor));
    results = results.concat(chunkResults);
    if(i===0&&files.length>4)toast(files.length+'枚を処理中...','i');
  }
  return results;
}

async function doCastUpload(){
  var files=_pf.cast;
  if(!files.length){toast('ファイルを選択してください','e');return}
  if(!S.casts)S.casts=[];
  toast(files.length+'枚を並列処理中...','i');
  var results = await uploadParallel(files, async function(f){
    var du = await rf(f);
    return {id:uid(), du:du, name:f.name, active:true};
  });
  S.casts = S.casts.concat(results);
  sv();
  toast(files.length+'枚追加しました','s');
  goSub('cast');
}

async function doQRUpload(){
  var files=_pf.qr;
  if(!files.length){toast('ファイルを選択してください','e');return}
  if(!S.qrs)S.qrs=[];
  toast(files.length+'枚を並列処理中...','i');
  var baseLen = S.qrs.length;
  var results = await uploadParallel(files, async function(f){
    var du = await rf(f);
    return {id:uid(), du:du, name:f.name, active:false};
  });
  // 最初の1枚だけアクティブ（既存がなければ）
  if(baseLen===0 && results.length>0) results[0].active=true;
  S.qrs = S.qrs.concat(results);
  sv();
  toast(files.length+'枚追加しました','s');
  goSub('qr');
}

// チェックボックス関連
function onImgChk(type){
  var chks=document.querySelectorAll('.'+type+'-chk');
  var checked=Array.from(chks).filter(function(c){return c.checked});
  var btn=document.getElementById(type+'-del-btn');
  if(btn)btn.style.display=checked.length>0?'inline-flex':'none';
  // 選択されたものをハイライト
  chks.forEach(function(c){
    var igi=document.getElementById('igi-'+type+'-'+c.dataset.id);
    if(igi)igi.style.outline=c.checked?'2px solid var(--rd)':'none';
  });
}
function selectAllImg(type){
  var chks=document.querySelectorAll('.'+type+'-chk');
  var allChecked=Array.from(chks).every(function(c){return c.checked});
  chks.forEach(function(c){
    c.checked=!allChecked;
    var igi=document.getElementById('igi-'+type+'-'+c.dataset.id);
    if(igi)igi.style.outline=c.checked?'2px solid var(--rd)':'none';
  });
  var btn=document.getElementById(type+'-del-btn');
  if(btn)btn.style.display=allChecked?'none':'inline-flex';
}
function delSelectedImg(type){
  var chks=document.querySelectorAll('.'+type+'-chk:checked');
  var ids=Array.from(chks).map(function(c){return c.dataset.id});
  if(!ids.length)return;
  if(!confirm(ids.length+'枚を削除しますか？'))return;
  if(type==='cast'){S.casts=(S.casts||[]).filter(function(c){return ids.indexOf(c.id)<0})}
  else{S.qrs=(S.qrs||[]).filter(function(q){return ids.indexOf(q.id)<0})}
  sv();toast(ids.length+'枚削除しました','s');goSub(type);
}

function delCast(id){S.casts=(S.casts||[]).filter(function(c){return c.id!==id});sv();goSub('cast')}
function togCast(id){var c=(S.casts||[]).find(function(c){return c.id===id});if(c){c.active=!c.active;sv();goSub('cast')}}
function delQR(id){S.qrs=(S.qrs||[]).filter(function(q){return q.id!==id});sv();goSub('qr')}
function togQR(id){var q=(S.qrs||[]).find(function(q){return q.id===id});if(q){q.active=!q.active;sv();goSub('qr')}}

// CAL/SHIFT CRUD
function addCalRow(){var d=document.getElementById('cal-d').value;if(!d){toast('日付を入力してください','e');return}var cl=document.getElementById('cal-cl').classList.contains('on');var ev=document.getElementById('cal-ev').value.trim();if(!S.calData)S.calData=[];var i=S.calData.findIndex(function(r){return r.date===d});if(i>=0)S.calData[i]={date:d,isClosed:cl,eventName:ev||null};else S.calData.push({date:d,isClosed:cl,eventName:ev||null});sv();toast('保存しました','s');goSub('cal')}
function editCalRow(d){var r=(S.calData||[]).find(function(x){return x.date===d});if(!r)return;var ev=prompt('イベント名を編集（空で削除）：',r.eventName||'');if(ev===null)return;r.eventName=ev.trim()||null;sv();toast('更新しました','s');goSub('cal')}
function delCalRow(d){if(!confirm(fmtS(d)+' を削除しますか？'))return;S.calData=(S.calData||[]).filter(function(r){return r.date!==d});sv();goSub('cal')}
function addShRow(){var d=document.getElementById('sh-d').value;if(!d){toast('日付を入力してください','e');return}var raw=document.getElementById('sh-c').value;var casts=raw.split(/[、,\n]+/).map(function(s){return s.trim()}).filter(Boolean);if(!S.shiftData)S.shiftData=[];var i=S.shiftData.findIndex(function(r){return r.date===d});if(i>=0)S.shiftData[i]={date:d,casts:casts};else S.shiftData.push({date:d,casts:casts});sv();toast('保存しました','s');goSub('shift')}
function editShRow(d){var r=(S.shiftData||[]).find(function(x){return x.date===d});if(!r)return;var c=prompt('キャスト名を編集（「、」区切り）：',r.casts.join('、'));if(c===null)return;r.casts=c.split(/[、,\n]+/).map(function(s){return s.trim()}).filter(Boolean);sv();toast('更新しました','s');goSub('shift')}
function delShRow(d){if(!confirm(fmtS(d)+' を削除しますか？'))return;S.shiftData=(S.shiftData||[]).filter(function(r){return r.date!==d});sv();goSub('shift')}
function copyShift(){var t=(S.shiftData||[]).map(function(r){return r.date+'：'+r.casts.join('、')}).join('\n');if(navigator.clipboard)navigator.clipboard.writeText(t).then(function(){toast('コピーしました','s')}).catch(function(){toast('コピーできませんでした','e')})}
function clearAll(type){if(!confirm('全データを削除しますか？'))return;if(type==='cal')S.calData=[];else S.shiftData=[];sv();toast('削除しました','i');goSub(type)}

function testLINESend(){if(!S.settings||!S.settings.lt){toast('チャネルアクセストークンを設定してください','e');return}toast('テスト送信はVercelデプロイ後に有効になります','i')}
function showXForm(){var el=document.getElementById('xform');if(el){el.style.display='block';el.scrollIntoView({behavior:'smooth'})}}
function hideXForm(){var el=document.getElementById('xform');if(el)el.style.display='none'}
function saveX(){var l=document.getElementById('xa-l');if(!l||!l.value.trim()){toast('アカウント名を入力してください','e');return}if(!S.xAccs)S.xAccs=[];S.xAccs.push({id:uid(),label:l.value.trim(),un:'',ak:document.getElementById('xa-ak').value.trim(),as:document.getElementById('xa-as').value.trim(),at:document.getElementById('xa-at').value.trim(),ats:document.getElementById('xa-ats').value.trim(),active:S.xAccs.length===0,vAt:null});sv();toast('アカウントを追加しました','s');goSub('xacc')}

function startSched(){S.schedOn=true;sv();addLog('info','スケジューラ開始');toast('スケジューラを開始しました（Vercelデプロイ後に実際の投稿が有効）','s');goSub('sched')}

// USER MANAGEMENT

function setUserRole(id,role){var u=(S.users||[]).find(function(u){return u.id===id});if(!u)return;u.role=role;sv();toast(u.name+'を'+(role==='admin'?'管理者に昇格':'一般ユーザーに降格')+'しました','s');go('users')}
function editUserName(id){var u=(S.users||[]).find(function(u){return u.id===id});if(!u)return;var n=prompt('新しい名前：',u.name);if(!n||!n.trim())return;u.name=n.trim();sv();toast('名前を変更しました','s');go('users')}
function removeUser(id){var u=(S.users||[]).find(function(u){return u.id===id});if(!u)return;if(!confirm(u.name+'を削除しますか？'))return;S.users=S.users.filter(function(x){return x.id!==id});sv();toast(u.name+'を削除しました','i');go('users')}

function hideInviteForm(){var el=document.getElementById('invite-form');if(el)el.style.display='none'}
function inviteUser(){var name=document.getElementById('inv-name').value.trim(),email=document.getElementById('inv-email').value.trim(),role=document.getElementById('inv-role').value;if(!name||!email){toast('名前とメールを入力してください','e');return}if((S.users||[]).find(function(u){return u.email===email})){toast('このメールアドレスは既に登録されています','e');return}if(!S.users)S.users=[];S.users.push({id:uid(),name:name,email:email,role:role,status:'active',isOwner:false,isMe:false,createdAt:new Date().toISOString()});sv();toast(name+'を招待しました','s');go('users')}

// COPY SLOT
function copySlot(id){
  var ta=document.getElementById(id);
  if(!ta)return;
  var text=ta.value;
  // まずClipboard APIを試す
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){
      toast('コピーしました','s');
    }).catch(function(){
      // 失敗したらexecCommandにフォールバック
      fallbackCopy(ta,text);
    });
  } else {
    fallbackCopy(ta,text);
  }
}
function fallbackCopy(ta,text){
  ta.style.display='block';
  ta.select();
  ta.setSelectionRange(0,99999);
  try{
    var ok=document.execCommand('copy');
    toast(ok?'コピーしました':'テキストを長押しして選択してください','s');
  }catch(e){
    toast('テキストを長押しして選択してください','i');
  }
  ta.style.display='none';
}
